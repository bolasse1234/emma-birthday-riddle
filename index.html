<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <meta
      name="description"
      content="Mock-up fuer ein Geburtstagsraetsel."
    />
    <title>Emma | Brief 18</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%239f3647'/%3E%3Cpath d='M12 22h40v25H12z' fill='%23fff7ed'/%3E%3Cpath d='M12 22l20 16 20-16' fill='none' stroke='%239f3647' stroke-width='4' stroke-linejoin='round'/%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="hero" aria-labelledby="page-title">
        <div class="hero__photo" aria-hidden="true">
          <div class="paper-stack paper-stack--one"></div>
          <div class="paper-stack paper-stack--two"></div>
          <div class="seal">18</div>
        </div>

        <div class="hero__content">
          <p class="eyebrow">Emma</p>
          <h1 id="page-title">Geburtstags&shy;raetsel.</h1>
          <p class="lede">
            Mock-up fuer QR-Code, Hosting und Domain.
          </p>
          <button class="start-button" type="button" data-start>
            Start
          </button>
        </div>
      </section>

      <section class="riddle-section" aria-labelledby="riddle-title">
        <div class="riddle-panel" data-riddle-panel>
          <div class="progress" aria-label="Fortschritt">
            <span class="progress__dot is-active"></span>
            <span class="progress__dot"></span>
            <span class="progress__dot"></span>
          </div>

          <p class="step-label" data-step-label>Frage 1 von 3</p>
          <h2 id="riddle-title" data-question>
            Platzhalterfrage 1
          </h2>
          <p class="hint" data-hint>
            Testantwort: 18
          </p>

          <form class="answer-form" data-answer-form>
            <label class="sr-only" for="answer">Antwort</label>
            <input
              id="answer"
              autocomplete="off"
              data-answer
              placeholder="Antwort eingeben"
              type="text"
            />
            <button type="submit">Pruefen</button>
          </form>

          <p class="feedback" data-feedback aria-live="polite"></p>
          <button class="skip-button" type="button" data-kind-unlock hidden>
            Demo entsperren
          </button>
        </div>
      </section>

      <section class="letter-section" data-letter-section hidden>
        <article class="letter" aria-labelledby="letter-title">
          <p class="letter__kicker">Demo</p>
          <h2 id="letter-title">Brief-Platzhalter</h2>
          <div class="letter__body">
            <p>[Brieftext hier einfuegen.]</p>
          </div>
          <p class="signature">[Name]</p>
        </article>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
